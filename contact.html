<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contat</title>

    <!--google font link-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!--css style link-->
    <link href="style.css" rel="stylesheet">

    <!-- fontawesome cdn link--->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!--Navbar section-->
    <section class="navbar">
        <div class="navbar__title">
            <h1>Nostra</h1>
        </div>
        <div class="navbar__menu">
            <a href="index.html">Home</a>
            <a href="index.html">New Arrival</a>
            <a href="index.html">Most Wanted</a>
            <a href="product.html">Collections</a>
            <a href="contact.html">Contact us</a>
        </div>
    </section>

    <!--contact section-->
    <section class="contact">
        <h1>Contact Us</h1>

        <div class="contact__container">
            <form class="contact__f">

                <label>Name:</label><br>
                <input type="text" class="contact-f__input" required><br>

                <label>Email:</label><br>
                <input type="email" class="contact-f__input" required><br>

                <label>Message:</label><br>
                <textarea class="contact-f__textarea" required></textarea><br>

                <input type="submit" class="contact-f__submit">

                <!-- Message -->
                <p class="form__msg"></p>

            </form>
        </div>
    </section>

    <!--news letter section-->
    <section class="news">
        <h2 class="news__title">Join our News Letter</h2>
        <p class="news__desc">
            Signup for our email newspaper to get exclusive discounts, updates, and more
        </p>
        <div class="news__container">
            <input class="news__input" type="text">
            <br>
            <button class="news__btn">Subscribe →</button>
        </div>
    </section>

    <!--footer section-->
    <section class="footer">
        <div class="footer__container">
            <h2 class="footer__title">Nostra</h2>
            <p class="footer__desc">
                The Standard chunk of Lorem ipsum used since the 1500s is reproduced below
            </p>

            <div class="footer__icons">
                <i class="fa-brands fa-square-twitter"></i>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-facebook-f"></i>
            </div>

            <p class="subtitle">@ 2023 Nostra.com</p>
        </div>
    </section>

    <!-- JavaScript link -->
     <script src="index.js"></script>


</body>

</html>
